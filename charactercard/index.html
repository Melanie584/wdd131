<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>

    <meta name="description" content="Snortleblat the Swamp Beast Diplomat character card built for WDD131.">

    <meta property="og:title" content="Snortleblat - Character Card">
    <meta property="og:description" content="A fantasy character card featuring a Swamp Beast Diplomat.">
    <meta property="og:image" content="https://melanie584.github.io/wdd131/charactercard/monster.webp">
    <meta property="og:url" content="https://melanie584.github.io/wdd131/charactercard/index.html">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Snortleblat - Character Card">
    <meta name="twitter:description" content="A fantasy character card featuring a Swamp Beast Diplomat.">
    <meta name="twitter:image" content="https://melanie584.github.io/wdd131/charactercard/monster.webp">

    <link rel="stylesheet" href="character.css">
    <script src="character.js" defer></script>
</head>
<body>

    <main class="card">

        <h1 id="monster_name"></h1>

        <img id="monster_image" alt="Monster Image">

        <div class="stats">
            <p><strong>Class:</strong> <span id="monster_class"></span></p>
            <p><strong>Level:</strong> <span id="monster_level"></span></p>
            <p><strong>Health:</strong> <span id="monster_health"></span></p>
        </div>

        <div class="buttons">
            <button id="attack">Attack</button>
            <button id="level_up">Level Up</button>
        </div>

    </main>

</body>
</html>
