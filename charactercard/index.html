<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>

    <link rel="stylesheet" href="character.css">
    <script src="character.js" defer></script>
</head>
<body>

    <main class="card">

        <h1 id="monster_name"></h1>

        <img id="monster_image" alt="Monster Image">

        <div class="stats">
            <p><strong>Class:</strong> <span id="monster_class"></span></p>
            <p><strong>Level:</strong> <span id="monster_level"></span></p>
            <p><strong>Health:</strong> <span id="monster_health"></span></p>
        </div>

        <div class="buttons">
            <button id="attack">Attack</button>
            <button id="level_up">Level Up</button>
        </div>

    </main>

</body>
</html>
