<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <link rel="stylesheet" href="recipe.css">
    <script src="recipe.js" defer></script>
</head>

<body>

<main>

    <div class="title">
        <img src="images/recipe-book.png" alt="recipe book" class="book">
        <h1>Recipe Book</h1>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="Find a recipe" id="searchInput">

        <button class="submit" type="button">
            <img src="images/search.svg" alt="Search image">
        </button>
    </div>

    <div id="recipeContainer"></div>

</main>

<footer>

    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
        Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>

</footer>

</body>
</html>
