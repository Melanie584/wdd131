<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <link rel="stylesheet" href="recipe.css">
</head>

<body>

<main>

    <div class="title">
        <img src="images/recipe-book.png" alt="recipe book" class="book">
        <h1>Recipe Book</h1>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="Find a recipe">
        <img src="images/search.svg" alt="Search image" class="search">
    </div>

    <div class="recipe">
        <img src="images/apple-crisp.jpg" alt="Image of apple crisp" class="pie">

        <div class="recipe-text">
            <p class="tag">dessert</p>

            <h2>Apple Crisp</h2>

            <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>

            <p class="description">
                This apple crisp recipe is a simple yet delicious fall dessert that is great served warm with vanilla ice cream
            </p>
        </div>

    </div>

</main>

<footer>

    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
        Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>

</footer>

</body>
</html>
